<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 56" fill="none">
  <defs>
    <linearGradient id="lt-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8860A"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </linearGradient>
    <linearGradient id="lt-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E07010"/>
    </linearGradient>
    <!-- Tall candle: dark navy on light bg -->
    <linearGradient id="lt-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1e3a6e"/>
      <stop offset="100%" stop-color="#0F1629"/>
    </linearGradient>
    <linearGradient id="lt-arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#C8860A"/>
      <stop offset="100%" stop-color="#0F1629"/>
    </linearGradient>
  </defs>

  <polyline
    points="4,46  16,28  24,38  36,18"
    stroke="url(#lt-gold)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <line x1="19" y1="20" x2="19" y2="23" stroke="#F5A623" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="16" y="23" width="6" height="9" rx="1.2" fill="url(#lt-amber)"/>
  <line x1="19" y1="32" x2="19" y2="35" stroke="#F5A623" stroke-width="1.4" stroke-linecap="round"/>

  <line x1="31" y1="14" x2="31" y2="18" stroke="#E07010" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="27.5" y="18" width="7" height="13" rx="1.3" fill="url(#lt-amber)"/>
  <line x1="31" y1="31" x2="31" y2="35" stroke="#E07010" stroke-width="1.5" stroke-linecap="round"/>

  <line x1="43" y1="8"  x2="43" y2="13" stroke="#1e3a6e" stroke-width="1.6" stroke-linecap="round"/>
  <rect x="39" y="13" width="8" height="17" rx="1.4" fill="url(#lt-dark)"/>
  <line x1="43" y1="30" x2="43" y2="35" stroke="#1e3a6e" stroke-width="1.6" stroke-linecap="round"/>

  <line x1="10" y1="48" x2="50" y2="18"
    stroke="url(#lt-arrow)" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M50 18 L44 19.5 M50 18 L48.5 24"
    stroke="url(#lt-arrow)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>

  <text
    x="66" y="37"
    font-family="'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="22"
    font-weight="700"
    letter-spacing="-0.6"
    fill="#0F1629"
  >PropCapital</text>
</svg>
